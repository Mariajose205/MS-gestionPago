server:
  port: 8081

spring:
  application:
    name: payment-management
  
  datasource:
    url: jdbc:mysql://localhost:3306/fitlife_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    
logging:
  level:
    com.fitlife.payment: DEBUG
    org.springframework.amqp: DEBUG

# Configuración de RabbitMQ
rabbitmq:
  exchange:
    name: fitlife.exchange
  routing:
    key:
      payment: payment.created
      reservation: reservation.created
      notification: notification.email
