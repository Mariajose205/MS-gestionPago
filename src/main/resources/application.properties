# Server Configuration
server.port=8086
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitlife_pagos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.fitlife.pago=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# RabbitMQ Exchange and Routing Keys
fitlife.exchange.reserva-confirmada=fitlife.reserva.confirmada
fitlife.routing-key.cupo=fitlife.reserva.confirmada
fitlife.routing-key.mensaje=fitlife.mensaje.enviado

# Microservicios Configuration
ms.reservas.url=http://localhost:8082/api

# Application Info
spring.application.name=MS-gestionPago
management.endpoints.web.exposure.include=health,info,circuitbreakers

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.pagosCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.pagosCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.pagosCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.pagosCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.pagosCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.pagosCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.pagosCB.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.pagosCB.slowCallDurationThreshold=2s

# Resilience4j Retry Configuration
resilience4j.retry.instances.pagosRetry.maxAttempts=3
resilience4j.retry.instances.pagosRetry.waitDuration=1s
resilience4j.retry.instances.pagosRetry.retryExceptions=java.io.IOException,java.util.concurrent.TimeoutException
