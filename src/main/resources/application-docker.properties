# Server Configuration
server.port=8086
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://mysql-pagos:3306/fitlife_pagos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ Configuration
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# RabbitMQ Exchange and Routing Keys
fitlife.exchange.reserva-confirmada=fitlife.reserva.confirmada
fitlife.routing-key.cupo=fitlife.reserva.confirmada
fitlife.routing-key.mensaje=fitlife.mensaje.enviado

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.fitlife.pago=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Info
spring.application.name=MS-gestionPago
management.endpoints.web.exposure.include=health,info,circuitbreakers
