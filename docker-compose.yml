version: '3.8'

services:
  mysql-pagos:
    image: mysql:8.0
    container_name: mysql-pagos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitlife_pagos_db
    ports:
      - "3308:3306"
    networks:
      - fitlife-network
    volumes:
      - mysql-pagos-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - fitlife-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  ms-gestion-pago:
    build: .
    container_name: ms-gestion-pago
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-pagos:3306/fitlife_pagos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    networks:
      - fitlife-network
    depends_on:
      mysql-pagos:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: always

networks:
  fitlife-network:
    driver: bridge

volumes:
  mysql-pagos-data:
  rabbitmq-data:
